<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Homepage of Kanau Shimada</title>
    <style>
        body {
            background-color: #ffffff; /* 背景を白色に */
            color: #000000; /* 文字を黒色に */
            font-family: sans-serif;
            margin: 20px; /* 画面の端に少し余白を持たせる */
        }
        .header-title {
            font-size: 24px;
            font-weight: bold; /* 太字 */
            text-align: left; /* 左詰め */
            margin-bottom: 20px;
        }
        .menu {
            display: flex; /* ボタンを横に並べる */
            gap: 10px; /* ボタン同士の隙間 */
            margin-bottom: 40px;
        }
        .menu-button {
            display: inline-block;
            background-color: #f8f8f8; /* 四角いボタンを見やすくするための薄いグレー */
            color: #000000;
            text-decoration: none; /* リンクの下線を消す */
            padding: 10px 20px;
            border: 1px solid #cccccc; /* ボタンの枠線 */
            font-weight: bold;
            text-align: center;
        }
        .menu-button:hover {
            background-color: #e0e0e0; /* マウスを乗せたときに少し色を濃くする */
        }
    </style>
</head>
<body>

    <div class="header-title">Homepage of Kanau Shimada</div>

    <div class="menu">
        <a href="index.html" class="menu-button">Home</a>
        <a href="papers.html" class="menu-button">Papers</a>
        <a href="notes.html" class="menu-button">Notes</a>
        <a href="talks.html" class="menu-button">Talks</a>
        <a href="links.html" class="menu-button">Links</a>
    </div>

    <p>ここはHomeのページです。</p>

</body>
</html>
