<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Homepage of Kanau Shimada</title>
    <style>
        body {
            background-color: #ffffff; /* 背景を白色に */
            color: #000000; /* 文字を黒色に */
            font-family: sans-serif;
            margin: 20px; /* 画面の端に少し余白を持たせる */
        }
        .header-title {
            font-size: 24px; /* タイトルの大きさは元のサイズ */
            font-weight: bold; /* 太字 */
            text-align: left; /* 左詰め */
            margin-bottom: 20px;
            
            /* ★ここを追加して、タイトルだけを半文字分右にずらしました */
            padding-left: 0.5em; 
        }
        
        /* ボタンをまとめるメニュー全体の塊 */
        .menu {
            display: inline-flex; /* ボタンの長さに合わせた幅にする */
            gap: 0; /* ボタン同士の隙間をぴったりゼロにする */
            margin-bottom: 40px;
            border: 1px solid #e0e0e0; /* メニュー全体の枠線 */
            border-radius: 50px; /* 左右の端をきれいな半円にする */
            overflow: hidden; /* 丸くした角からはみ出るボタンの端っこをきれいにカットする */
        }
        
        /* ボタン個別の設定 */
        .menu-button {
            display: inline-block;
            background-color: #f8f8f8; /* ボタンの背景（薄いグレー） */
            color: #000000;
            text-decoration: none; /* リンクの下線を消す */
            
            /* 高さを文字と同じくらいに抑える設定 */
            padding: 3px 16px; /* 上下の余白を3pxまで極限に狭くし、文字の高さに合わせました */
            
            font-size: 14px;
            letter-spacing: 0.05em;
            font-weight: bold;
            text-align: center;
            
            /* ボタン同士の間の線だけを引く設定 */
            border: none;
            border-right: 1px solid #e0e0e0; 
        }
        
        /* 一番右側のボタンだけは、右の線を消す（全体の枠線と重なって太くなるのを防ぐため） */
        .menu-button:last-child {
            border-right: none;
        }
        
        .menu-button:hover {
            background-color: #e0e0e0; /* マウスを乗せたときに少し色を濃くする */
        }
    </style>
</head>
<body>

    <!-- 画面上部のタイトル（少し右にずれます） -->
    <div class="header-title">Homepage of Kanau Shimada</div>

    <!-- 四角いボタンのメニュー -->
    <div class="menu">
        <a href="index.html" class="menu-button">Home</a>
        <a href="papers.html" class="menu-button">Papers</a>
        <a href="notes.html" class="menu-button">Notes</a>
        <a href="talks.html" class="menu-button">Talks</a>
        <a href="diary.html" class="menu-button">Diary</a>
        <a href="links.html" class="menu-button">Links</a>
    </div>

    <!-- ここから下にHomeページの内容を書きます -->
    <p>ここはHomeのページです。</p>

</body>
</html>
