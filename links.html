<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Links</title>
    <style>
        /* 基本のデザイン */
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; margin: 20px; }
        .header-title { font-size: 24px; font-weight: bold; text-align: left; margin-bottom: 20px; padding-left: 0.5em; }
        .menu { display: inline-flex; gap: 0; margin-bottom: 40px; border: 1px solid #e0e0e0; border-radius: 50px; overflow: hidden; }
        .menu-button { display: inline-block; background-color: #f8f8f8; color: #000000; text-decoration: none; padding: 3px 16px; font-size: 14px; letter-spacing: 0.05em; font-weight: bold; text-align: center; border: none; border-right: 1px solid #e0e0e0; }
        .menu-button:last-child { border-right: none; }
        .menu-button:hover { background-color: #e0e0e0; }

        /* 見出しのデザイン */
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 5px;
        }

        /* リンク用のデザイン */
        .link-list {
            list-style-type: none; /* 先頭の黒丸を消す */
            padding-left: 0;
            margin-top: 15px;
        }
        .link-item {
            margin-bottom: 20px; /* リンクごとの間隔 */
            line-height: 1.6;
        }
        .link-name {
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            text-decoration: underline; /* クリックできることが分かるように下線を引く */
        }
        .link-name:hover {
            color: #666666; /* マウスを乗せたら少し薄くする */
        }
        .link-desc {
            font-size: 14px;
            color: #555555;
            margin-top: 4px;
            padding-left: 10px;
            border-left: 3px solid #e0e0e0; /* 説明文の左側に薄い線を引いてスッキリ見せる */
        }
    </style>
</head>
<body>

    <div class="header-title">Links</div>

    <div class="menu">
        <a href="index.html" class="menu-button">Home</a>
        <a href="papers.html" class="menu-button">Papers</a>

        <a href="diary.html" class="menu-button">Diary</a>
        <a href="links.html" class="menu-button">Links</a>
    </div>

    <div class="section-title">My personal links</div>
    <ul class="link-list">
        <li class="link-item">
            <a href="https://www.youtube.com/@mathandphysics6113" class="link-name" target="_blank">YouTube Channel</a>
            <div class="link-desc">数学の解説動画をアップロードしています。</div>
        </li>
        <li class="link-item">
            <a href="https://note.com/stacking_notes" class="link-name" target="_blank">note</a>
            <div class="link-desc">手書きの勉強ノートを置いています。</div>
        </li>
    </ul>

</html>
